<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Book</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; max-width: 700px; }
        form { display: grid; gap: 0.75rem; }
        label { display: grid; gap: 0.25rem; }
        input { padding: 0.5rem; }
        .error { color: #b00020; font-size: 0.9rem; }
        .actions { margin-top: 1rem; display: flex; gap: 1rem; }
    </style>
</head>
<body>
<h1>Add Book</h1>

<form th:action="@{/books}" th:object="${bookForm}" method="post">
    <p class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>

    <label>
        Title
        <input type="text" th:field="*{title}" placeholder="Clean Code">
        <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
    </label>

    <label>
        Author
        <input type="text" th:field="*{author}" placeholder="Robert C. Martin">
        <span class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
    </label>

    <label>
        ISBN
        <input type="text" th:field="*{isbn}" placeholder="978-0132350884">
        <span class="error" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></span>
    </label>

    <label>
        Published year
        <input type="number" th:field="*{publishedYear}" min="1" placeholder="2008">
        <span class="error" th:if="${#fields.hasErrors('publishedYear')}" th:errors="*{publishedYear}"></span>
    </label>

    <div class="actions">
        <button type="submit">Create</button>
        <a th:href="@{/books}">Back to list</a>
    </div>
</form>

</body>
</html>
